<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hue Slider Test</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    .test-section { padding: 40px; text-align: center; }
    .hue-slider { width: 300px; margin: 20px 0; }
  </style>
</head>
<body>
  <div class="test-section" id="test-section">
    <span id="test-label">Full Stack Developer</span><br>
    <h1 id="test-title">Gabriel Ramores</h1><br>
    <h2 id="test-headline">Building for your satisfaction</h2><br>
    <p id="test-text">select your favorite color</p>
    <input type="range" min="0" max="360" value="155" class="hue-slider" id="hue-slider">
    <span id="hue-value">155°</span><br>
    <p id="test-text">you matter</p>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const hueSlider = document.getElementById('hue-slider');
      const hueValueText = document.getElementById('hue-value');
      const testSection = document.getElementById('test-section');

      if (hueSlider && hueValueText && testSection) {
        const updateTheme = (hue) => {
          const colors = ['#FF0000', '#FFFF00', '#00FF00', '#00FFFF', '#0000FF', '#FF00FF', '#FF0000'];
          const segment = Math.floor(hue / 60);
          const color = colors[segment] || '#00FF00';

          const r = parseInt(color.slice(1, 3), 16);
          const g = parseInt(color.slice(3, 5), 16);
          const b = parseInt(color.slice(5, 7), 16);
          const backgroundColor = `rgba(${r}, ${g}, ${b}, 0.1)`;

          testSection.style.backgroundColor = backgroundColor;

          document.querySelectorAll('#test-label, #test-title, #test-headline, #test-text').forEach(element => {
            element.style.color = color;
          });

          hueValueText.textContent = hue + '°';
          hueValueText.style.color = color;
        };

        hueSlider.addEventListener('input', (e) => {
          updateTheme(parseInt(e.target.value));
        });

        updateTheme(parseInt(hueSlider.value));
      }
    });
  </script>
</body>
</html>
